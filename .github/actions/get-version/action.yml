name: Get version
description: Output the release version, the tag name without the leading v
outputs:
  version:
    description: Tag name without the leading v
    value: ${{ steps.version.outputs.version }}
runs:
  using: composite
  steps:
    - id: version
      shell: bash
      run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
