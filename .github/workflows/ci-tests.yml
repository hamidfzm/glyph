name: Tests

on:
  workflow_call:

jobs:
  test-frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/pnpm-setup
      - run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        run: pnpm test:coverage
      - name: Upload coverage report (artifact)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 14
      - name: Upload frontend coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          # PyPI uploader: the GPG-verified binary intermittently fails.
          use_pypi: true
      - name: Upload frontend test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          files: junit-frontend.xml
          flags: frontend
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          # PyPI uploader: the GPG-verified binary intermittently fails.
          use_pypi: true

  test-rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup
        with:
          components: llvm-tools-preview
      - name: Install Linux dependencies
        timeout-minutes: 8
        uses: ./.github/actions/linux-deps
        with:
          cache-key: apt-webkit-ubuntu-latest-${{ runner.arch }}-v1
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Run Rust tests with coverage
        working-directory: src-tauri
        run: cargo llvm-cov nextest --lcov --output-path ../coverage-rust.lcov --profile ci
      - name: Upload Rust coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: coverage-rust.lcov
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          # PyPI uploader: the GPG-verified binary intermittently fails.
          use_pypi: true
      - name: Upload Rust test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          files: src-tauri/target/nextest/ci/junit.xml
          flags: rust
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          # PyPI uploader: the GPG-verified binary intermittently fails.
          use_pypi: true

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup
        with:
          components: clippy
      - name: Install Linux dependencies
        timeout-minutes: 8
        uses: ./.github/actions/linux-deps
        with:
          cache-key: apt-webkit-ubuntu-latest-${{ runner.arch }}-v1
      - name: Add Clippy problem matcher
        run: echo "::add-matcher::.github/matchers/rust.json"
      - name: Run Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
