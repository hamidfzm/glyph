name: Build

on:
  workflow_call:

jobs:
  build:
    name: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, ubuntu-22.04-arm, windows-latest]
        # Single-value dimension so `exclude` can key off the event:
        # ARM Linux only builds on pushes to main.
        is_pr:
          - ${{ github.event_name == 'pull_request' }}
        exclude:
          - platform: ubuntu-22.04-arm
            is_pr: true
        include:
          # PRs skip installer bundling and build single-arch macOS; pushes
          # to main build the full universal/bundled artifacts.
          - platform: macos-latest
            args_full: "--target universal-apple-darwin"
            args_pr: "--target aarch64-apple-darwin --no-bundle"
            targets_full: "aarch64-apple-darwin,x86_64-apple-darwin"
            targets_pr: "aarch64-apple-darwin"
          - platform: ubuntu-22.04
            # Bundle analysis needs the real bundle, so no --no-bundle here.
            args_full: ""
            args_pr: ""
            bundle_analysis: true
          # No include entry for ubuntu-22.04-arm: include is processed
          # AFTER exclude, so an entry here would resurrect the excluded
          # PR leg as a new combination. Undefined args_full is ''.
          - platform: windows-latest
            args_full: ""
            args_pr: "--no-bundle"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ github.event_name == 'pull_request' && matrix.targets_pr || matrix.targets_full }}
      - name: Cache apt packages
        if: startsWith(matrix.platform, 'ubuntu')
        uses: actions/cache@v5
        with:
          path: ~/apt-cache/*.deb
          key: apt-webkit-${{ matrix.platform }}-v1
      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        timeout-minutes: 8
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          mkdir -p ~/apt-cache/partial
          sudo apt-get update
          sudo apt-get -o Dir::Cache::archives="$HOME/apt-cache" \
            -o Binary::apt::APT::Keep-Downloaded-Packages=true \
            install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils xvfb
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODECOV_TOKEN: ${{ matrix.bundle_analysis && secrets.CODECOV_TOKEN || '' }}
        with:
          args: ${{ github.event_name == 'pull_request' && matrix.args_pr || matrix.args_full }}
      # Boots the real webview under the production CSP and exercises the
      # grant-gated CLI export end to end; unit tests cannot enforce CSP.
      - name: Headless export smoke test
        if: matrix.platform == 'ubuntu-22.04'
        timeout-minutes: 5
        env:
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
        run: |
          xvfb-run --auto-servernum ./src-tauri/target/release/glyph "$PWD/samples" --export-website /tmp/csp-smoke
          test -f /tmp/csp-smoke/index.html
          test "$(ls /tmp/csp-smoke/*.html | wc -l)" -ge 3

  build-android:
    name: Android
    # Android APK skips PRs; desktop builds cover them. Any non-PR event
    # (push, and future dispatch/schedule triggers) gets the full build.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: 29.0.14206865
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Cache NDK
        id: ndk-cache
        uses: actions/cache@v5
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          key: ndk-${{ env.NDK_VERSION }}
      - name: Install NDK
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: sdkmanager "ndk;${{ env.NDK_VERSION }}"
      - run: pnpm install --frozen-lockfile
      - name: Build Android APK (debug, aarch64)
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
        run: pnpm tauri android build --debug --apk --target aarch64
      - name: Upload debug APK
        uses: actions/upload-artifact@v5
        with:
          name: glyph-android-debug-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk
          retention-days: 14
