# Normalize PR titles to conventional commits when bots open non-standard titles
# (e.g. CodeQL / Copilot Autofix "Potential fix for…", Dependabot "Bump …").

name: PR title (conventional)

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  normalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title;
            const conventional =
              /^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\([^)]+\))?(!)?:\s+\S/.test(
                title,
              );
            if (conventional) {
              core.info('Title already conventional; skipping.');
              return;
            }

            let newTitle = null;

            const potential = title.match(/^Potential fix for .+?:\s*(.+)$/i);
            if (potential) {
              const rest = potential[1].trim();
              if (rest.length > 0) {
                newTitle = `fix(security): ${rest.charAt(0).toLowerCase()}${rest.slice(1)}`;
              }
            }

            if (!newTitle && /^Bump /i.test(title)) {
              newTitle = `chore(deps): ${title.replace(/^Bump /i, 'bump ')}`;
            }

            if (!newTitle || newTitle === title) {
              core.info('No rewrite rule matched or title unchanged; skipping.');
              return;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              title: newTitle,
            });
            core.info(`Updated PR title to: ${newTitle}`);
