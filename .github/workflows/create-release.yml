name: Create Release
run-name: Create Release v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.4.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # main's ruleset only lets deploy keys push; humans and PATs go through PRs.
      - name: Set up release deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.RELEASE_DEPLOY_KEY }}" > ~/.ssh/release_key
          chmod 600 ~/.ssh/release_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          git remote set-url --push origin "git@github.com:${{ github.repository }}.git"
          echo "GIT_SSH_COMMAND=ssh -i ~/.ssh/release_key -o IdentitiesOnly=yes" >> "$GITHUB_ENV"

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format '${{ inputs.version }}'. Expected semver (e.g. 1.2.3)"
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ inputs.version }}$"; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Bump version in package.json
        run: |
          jq --arg v "${{ inputs.version }}" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Bump version in Cargo.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ inputs.version }}"/' src-tauri/Cargo.toml

      - name: Update Cargo.lock
        run: cargo update --manifest-path src-tauri/Cargo.toml -p glyph

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/Cargo.toml src-tauri/Cargo.lock
          if git diff --cached --quiet; then
            echo "Version already at ${{ inputs.version }}, skipping commit"
          else
            git commit -m "chore: bump version to ${{ inputs.version }}"
            git push origin main
          fi

      - name: Create and push tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"
