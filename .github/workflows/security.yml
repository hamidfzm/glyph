name: Security

on:
  # Push: only `main` so the weekly run is the source of truth for
  # feature-branch security findings. Direct pushes to feature branches
  # are still covered by their PR run.
  push:
    branches: [main]
  # PR: any target branch (PRs to `feature/*` get the same scan as PRs
  # to `main`).
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 6am UTC

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4

  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - run: cargo audit
        working-directory: src-tauri

  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # TODO: Revert to `pnpm audit --prod` when pnpm fixes bulk endpoint support
      # Workaround: https://github.com/pnpm/pnpm/issues/11265
      - run: pnpm audit --prod --ignore-registry-errors
