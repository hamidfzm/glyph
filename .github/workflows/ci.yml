name: CI

on:
  # Push: only protect `main`. Feature branches use PR runs for
  # validation; direct pushes to feature branches don't need their own
  # CI fire.
  push:
    branches: [main]
  # PR: every PR runs the gate regardless of target branch so stacked
  # PRs against `feature/*` get the same checks as PRs to `main`.
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: PR title (conventional commits)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if echo "$TITLE" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\([^)]+\))?(!)?: .+'; then
            echo "OK: $TITLE"
          else
            echo "::error::PR title must follow Conventional Commits (e.g. feat: add feature, fix(scope): description). See https://www.conventionalcommits.org/"
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Biome lint
        run: npx @biomejs/biome lint --error-on-warnings --reporter=github src/
      - name: Biome format check
        run: npx @biomejs/biome format --error-on-warnings --reporter=github src/

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Add TypeScript problem matcher
        run: echo "::add-matcher::.github/matchers/tsc.json"
      - run: pnpm typecheck

  test-frontend:
    name: Test (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        run: pnpm test:coverage
      - name: Upload coverage report (artifact)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 14
      - name: Upload frontend coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          # Install the uploader from PyPI instead of the GPG-verified binary,
          # which intermittently fails when Codecov's keyserver can't be reached.
          use_pypi: true
      - name: Upload frontend test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          files: junit-frontend.xml
          flags: frontend
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          # Install the uploader from PyPI instead of the GPG-verified binary,
          # which intermittently fails when Codecov's keyserver can't be reached.
          use_pypi: true

  test-rust:
    name: Test (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Cache apt packages
        uses: actions/cache@v5
        with:
          path: ~/apt-cache/*.deb
          key: apt-webkit-ubuntu-latest-${{ runner.arch }}-v1
      - name: Install Linux dependencies
        timeout-minutes: 8
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          mkdir -p ~/apt-cache/partial
          sudo apt-get update
          sudo apt-get -o Dir::Cache::archives="$HOME/apt-cache" \
            -o Binary::apt::APT::Keep-Downloaded-Packages=true \
            install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Run Rust tests with coverage
        working-directory: src-tauri
        run: cargo llvm-cov nextest --lcov --output-path ../coverage-rust.lcov --profile ci
      - name: Upload Rust coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: coverage-rust.lcov
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          # Install the uploader from PyPI instead of the GPG-verified binary,
          # which intermittently fails when Codecov's keyserver can't be reached.
          use_pypi: true
      - name: Upload Rust test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          files: src-tauri/target/nextest/ci/junit.xml
          flags: rust
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          # Install the uploader from PyPI instead of the GPG-verified binary,
          # which intermittently fails when Codecov's keyserver can't be reached.
          use_pypi: true

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Cache apt packages
        uses: actions/cache@v5
        with:
          path: ~/apt-cache/*.deb
          key: apt-webkit-ubuntu-latest-${{ runner.arch }}-v1
      - name: Install Linux dependencies
        timeout-minutes: 8
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          mkdir -p ~/apt-cache/partial
          sudo apt-get update
          sudo apt-get -o Dir::Cache::archives="$HOME/apt-cache" \
            -o Binary::apt::APT::Keep-Downloaded-Packages=true \
            install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Add Clippy problem matcher
        run: echo "::add-matcher::.github/matchers/rust.json"
      - name: Run Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

  build:
    name: Build (${{ matrix.platform }})
    needs: [lint, typecheck, test-frontend, test-rust, clippy]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
            bundle_analysis: true
          - platform: ubuntu-22.04-arm
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Cache apt packages
        if: startsWith(matrix.platform, 'ubuntu')
        uses: actions/cache@v5
        with:
          path: ~/apt-cache/*.deb
          key: apt-webkit-${{ matrix.platform }}-v1
      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        timeout-minutes: 8
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          mkdir -p ~/apt-cache/partial
          sudo apt-get update
          sudo apt-get -o Dir::Cache::archives="$HOME/apt-cache" \
            -o Binary::apt::APT::Keep-Downloaded-Packages=true \
            install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils xvfb
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODECOV_TOKEN: ${{ matrix.bundle_analysis && secrets.CODECOV_TOKEN || '' }}
        with:
          args: ${{ matrix.args }}
      # Boots the real webview under the production CSP and exercises the
      # grant-gated CLI export end to end; unit tests cannot enforce CSP.
      - name: Headless export smoke test
        if: matrix.platform == 'ubuntu-22.04'
        timeout-minutes: 5
        env:
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
        run: |
          xvfb-run --auto-servernum ./src-tauri/target/release/glyph "$PWD/samples" --export-website /tmp/csp-smoke
          test -f /tmp/csp-smoke/index.html
          test "$(ls /tmp/csp-smoke/*.html | wc -l)" -ge 3

  build-android:
    name: Build (Android)
    needs: [lint, typecheck, test-frontend, test-rust, clippy]
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: 29.0.14206865
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Cache NDK
        id: ndk-cache
        uses: actions/cache@v5
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          key: ndk-${{ env.NDK_VERSION }}
      - name: Install NDK
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: sdkmanager "ndk;${{ env.NDK_VERSION }}"
      - run: pnpm install --frozen-lockfile
      - name: Build Android APK (debug, aarch64)
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
        run: pnpm tauri android build --debug --apk --target aarch64
      - name: Upload debug APK
        uses: actions/upload-artifact@v5
        with:
          name: glyph-android-debug-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk
          retention-days: 14
