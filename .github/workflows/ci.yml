name: CI

on:
  # Push: only protect `main`. Feature branches use PR runs for
  # validation; direct pushes to feature branches don't need their own
  # CI fire.
  push:
    branches: [main]
  # PR: every PR runs the gate regardless of target branch so stacked
  # PRs against `feature/*` get the same checks as PRs to `main`.
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Orchestrator: the actual jobs live in the reusable workflows below.
jobs:
  pr-title:
    name: PR title (conventional commits)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if echo "$TITLE" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\([^)]+\))?(!)?: .+'; then
            echo "OK: $TITLE"
          else
            echo "::error::PR title must follow Conventional Commits (e.g. feat: add feature, fix(scope): description). See https://www.conventionalcommits.org/"
            exit 1
          fi

  checks:
    uses: ./.github/workflows/checks.yml

  tests:
    uses: ./.github/workflows/tests.yml
    secrets: inherit

  build:
    # Gate builds on the fast checks only (~40s); tests run in parallel
    # with the builds instead of in front of them.
    needs: checks
    uses: ./.github/workflows/build.yml
    secrets: inherit
