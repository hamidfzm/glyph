name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: ubuntu-22.04-arm
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Cache apt packages
        if: startsWith(matrix.platform, 'ubuntu')
        uses: actions/cache@v5
        with:
          path: ~/apt-cache/*.deb
          key: apt-webkit-${{ matrix.platform }}-v1
      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        timeout-minutes: 8
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          mkdir -p ~/apt-cache/partial
          sudo apt-get update
          sudo apt-get -o Dir::Cache::archives="$HOME/apt-cache" \
            -o Binary::apt::APT::Keep-Downloaded-Packages=true \
            install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Enables source-map upload from the Vite build (vite.config.ts). When
          # unset (e.g. forks), the Sentry plugin is skipped and the build still
          # succeeds.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Glyph ${{ github.ref_name }}"
          releaseBody: |
            ## Install

            ### macOS
            ```bash
            brew tap glyph-md/tap && brew trust glyph-md/tap && brew install --cask glyph
            ```
            Or download `Glyph_*_universal.dmg` below.

            ### Windows
            ```powershell
            # winget
            winget install hamidfzm.Glyph

            # Chocolatey
            choco install glyph

            # Scoop
            scoop bucket add glyph-md https://github.com/glyph-md/scoop-bucket
            scoop install glyph
            ```
            Or download `Glyph_*_x64_en-US.msi` below.

            ### Linux
            ```bash
            # Snap Store
            sudo snap install glyph

            # Arch (AUR)
            yay -S glyph-md-bin

            # Homebrew (Linuxbrew)
            brew tap glyph-md/tap && brew install glyph

            # Debian/Ubuntu (PPA)
            sudo add-apt-repository ppa:hamidfzm/glyph
            sudo apt update
            sudo apt install glyph

            # Debian (apt repo)
            curl -fsSL https://glyph-md.github.io/apt-repo/gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/glyph.gpg
            echo "deb [signed-by=/usr/share/keyrings/glyph.gpg] https://glyph-md.github.io/apt-repo stable main" | sudo tee /etc/apt/sources.list.d/glyph.list
            sudo apt update && sudo apt install glyph

            # Fedora/RHEL (dnf)
            sudo tee /etc/yum.repos.d/glyph.repo < <(curl -fsSL https://glyph-md.github.io/rpm-repo/glyph.repo)
            sudo dnf install glyph
            ```
            Or download the `.deb` / `.rpm` / `.AppImage` below.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  update-release-notes:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate changelog and prepend install instructions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANGELOG=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ github.ref_name }}" \
            -f previous_tag_name="$(gh release list --repo ${{ github.repository }} --limit 2 --json tagName --jq '.[1].tagName')" \
            --jq .body)

          BODY=$(cat <<'INSTALL'
          ## Install

          ### macOS
          ```bash
          brew tap glyph-md/tap && brew trust glyph-md/tap && brew install --cask glyph
          ```
          Or download `Glyph_*_universal.dmg` below.

          ### Windows
          ```powershell
          # winget
          winget install hamidfzm.Glyph

          # Chocolatey
          choco install glyph

          # Scoop
          scoop bucket add glyph-md https://github.com/glyph-md/scoop-bucket
          scoop install glyph
          ```
          Or download `Glyph_*_x64_en-US.msi` below.

          ### Linux
          ```bash
          # Snap Store
          sudo snap install glyph

          # Arch (AUR)
          yay -S glyph-md-bin

          # Homebrew (Linuxbrew)
          brew tap glyph-md/tap && brew install glyph

          # Debian/Ubuntu (PPA)
          sudo add-apt-repository ppa:hamidfzm/glyph
          sudo apt update
          sudo apt install glyph

          # Debian (apt repo)
          curl -fsSL https://glyph-md.github.io/apt-repo/gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/glyph.gpg
          echo "deb [signed-by=/usr/share/keyrings/glyph.gpg] https://glyph-md.github.io/apt-repo stable main" | sudo tee /etc/apt/sources.list.d/glyph.list
          sudo apt update && sudo apt install glyph

          # Fedora/RHEL (dnf)
          sudo tee /etc/yum.repos.d/glyph.repo < <(curl -fsSL https://glyph-md.github.io/rpm-repo/glyph.repo)
          sudo dnf install glyph
          ```
          Or download the `.deb` / `.rpm` / `.AppImage` below.

          ---

          INSTALL
          )

          printf '%s\n\n%s' "$BODY" "$CHANGELOG" > /tmp/release-body.md
          gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --notes-file /tmp/release-body.md

  publish-homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Download DMG and compute sha256
        id: sha
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "Glyph_${{ steps.version.outputs.version }}_universal.dmg"
          SHA=$(shasum -a 256 Glyph_${{ steps.version.outputs.version }}_universal.dmg | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
      - name: Update homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          HOMEPAGE=$(jq -r .homepage package.json)

          sed -e "s/{{VERSION}}/$VERSION/g" -e "s/{{SHA256}}/$SHA/g" \
            -e "s|{{HOMEPAGE}}|$HOMEPAGE|g" \
            homebrew/glyph.rb.template > /tmp/glyph.rb

          # Get current file SHA for update (or empty for first push)
          FILE_SHA=$(gh api repos/glyph-md/homebrew-tap/contents/Casks/glyph.rb --jq .sha 2>/dev/null || echo "")

          if [ -n "$FILE_SHA" ]; then
            gh api repos/glyph-md/homebrew-tap/contents/Casks/glyph.rb \
              --method PUT \
              --field message="chore: update glyph to $VERSION" \
              --field content="$(base64 -w0 /tmp/glyph.rb)" \
              --field sha="$FILE_SHA"
          else
            gh api repos/glyph-md/homebrew-tap/contents/Casks/glyph.rb \
              --method PUT \
              --field message="chore: add glyph cask $VERSION" \
              --field content="$(base64 -w0 /tmp/glyph.rb)"
          fi
      - name: Download Linux debs and compute sha256
        id: linux_sha
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "Glyph_${VERSION}_amd64.deb" \
            --pattern "Glyph_${VERSION}_arm64.deb"
          echo "sha256_amd64=$(shasum -a 256 "Glyph_${VERSION}_amd64.deb" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "sha256_arm64=$(shasum -a 256 "Glyph_${VERSION}_arm64.deb" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - name: Update homebrew-tap Linux formula
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_AMD64="${{ steps.linux_sha.outputs.sha256_amd64 }}"
          SHA_ARM64="${{ steps.linux_sha.outputs.sha256_arm64 }}"
          HOMEPAGE=$(jq -r .homepage package.json)

          sed -e "s/{{VERSION}}/$VERSION/g" \
            -e "s/{{SHA256_AMD64}}/$SHA_AMD64/g" \
            -e "s/{{SHA256_ARM64}}/$SHA_ARM64/g" \
            -e "s|{{HOMEPAGE}}|$HOMEPAGE|g" \
            homebrew/glyph-formula.rb.template > /tmp/glyph.rb

          # Get current file SHA for update (or empty for first push)
          FILE_SHA=$(gh api repos/glyph-md/homebrew-tap/contents/Formula/glyph.rb --jq .sha 2>/dev/null || echo "")

          if [ -n "$FILE_SHA" ]; then
            gh api repos/glyph-md/homebrew-tap/contents/Formula/glyph.rb \
              --method PUT \
              --field message="chore: update glyph linux formula to $VERSION" \
              --field content="$(base64 -w0 /tmp/glyph.rb)" \
              --field sha="$FILE_SHA"
          else
            gh api repos/glyph-md/homebrew-tap/contents/Formula/glyph.rb \
              --method PUT \
              --field message="chore: add glyph linux formula $VERSION" \
              --field content="$(base64 -w0 /tmp/glyph.rb)"
          fi

  publish-chocolatey:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Download MSI and compute sha256
        id: sha
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          gh release download "${{ github.ref_name }}" `
            --repo "${{ github.repository }}" `
            --pattern "Glyph_${version}_x64_en-US.msi"
          $hash = (Get-FileHash "Glyph_${version}_x64_en-US.msi" -Algorithm SHA256).Hash.ToLower()
          "sha256=$hash" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
      - name: Build and push Chocolatey package
        shell: pwsh
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $sha = "${{ steps.sha.outputs.sha256 }}"
          $repo = "${{ github.repository }}"
          $tag = "${{ github.ref_name }}"

          # Generate the version-specific changelog (same source as the GitHub
          # release notes) so the Chocolatey package page shows what changed in
          # this release instead of only linking to the releases list.
          $prevTag = gh release list --repo $repo --limit 2 --json tagName --jq '.[1].tagName'
          # gh emits the body as multiple lines, which PowerShell captures as a
          # string[]. Join it back with newlines so the Markdown survives (string
          # interpolation would otherwise flatten the array with spaces and turn
          # the whole changelog into one run-on paragraph).
          $changelog = (gh api "repos/$repo/releases/generate-notes" `
            -f tag_name="$tag" `
            -f previous_tag_name="$prevTag" `
            --jq .body) -join "`n"
          # Drop the leading "<!-- Release notes generated ... -->" comment GitHub
          # prepends; Chocolatey renders raw HTML as literal text, not a comment.
          $changelog = ($changelog -replace '(?s)^\s*<!--.*?-->\s*', '').Trim()

          # Append a "Links" section so users can jump to the release page,
          # docs, and issue tracker straight from the Chocolatey listing.
          $links = @(
            "## Links",
            "",
            "- Release page: https://github.com/$repo/releases/tag/$tag",
            "- All releases: https://github.com/$repo/releases",
            "- Documentation: https://github.com/$repo#readme",
            "- Report an issue: https://github.com/$repo/issues"
          ) -join "`n"
          $notes = "$changelog`n`n$links"

          $install = Get-Content chocolatey/tools/chocolateyinstall.ps1 -Raw
          $install = $install.Replace('{{SHA256}}', $sha)
          Set-Content chocolatey/tools/chocolateyinstall.ps1 $install

          # Set the version and inject the changelog via the XML DOM so any
          # special characters in the notes are escaped correctly.
          [xml]$nuspec = Get-Content chocolatey/glyph.nuspec -Raw
          $homepage = (Get-Content package.json -Raw | ConvertFrom-Json).homepage
          $nuspec.package.metadata.version = $version
          $nuspec.package.metadata.releaseNotes = $notes
          $nuspec.package.metadata.projectUrl = $homepage
          $nuspec.Save("$pwd\chocolatey\glyph.nuspec")

          cd chocolatey
          choco pack
          choco push glyph.$version.nupkg --source https://push.chocolatey.org/ --api-key $env:CHOCO_API_KEY

  publish-scoop:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Download MSI and compute sha256
        id: sha
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "Glyph_${VERSION}_x64_en-US.msi"
          SHA=$(shasum -a 256 "Glyph_${VERSION}_x64_en-US.msi" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
      - name: Update scoop-bucket
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          HOMEPAGE=$(jq -r .homepage package.json)

          sed -e "s/{{VERSION}}/$VERSION/g" -e "s/{{SHA256}}/$SHA/g" \
            -e "s|{{HOMEPAGE}}|$HOMEPAGE|g" \
            scoop/glyph.json.template > /tmp/glyph.json

          # Get current file SHA for update (or empty for first push)
          FILE_SHA=$(gh api repos/glyph-md/scoop-bucket/contents/bucket/glyph.json --jq .sha 2>/dev/null || echo "")

          if [ -n "$FILE_SHA" ]; then
            gh api repos/glyph-md/scoop-bucket/contents/bucket/glyph.json \
              --method PUT \
              --field message="chore: update glyph to $VERSION" \
              --field content="$(base64 -w0 /tmp/glyph.json)" \
              --field sha="$FILE_SHA"
          else
            gh api repos/glyph-md/scoop-bucket/contents/bucket/glyph.json \
              --method PUT \
              --field message="chore: add glyph $VERSION" \
              --field content="$(base64 -w0 /tmp/glyph.json)"
          fi

  publish-winget:
    needs: build
    runs-on: windows-latest
    steps:
      # Submits a manifest-update PR to microsoft/winget-pkgs for
      # hamidfzm.Glyph from the released MSI. Requires WINGET_GITHUB_TOKEN,
      # a classic PAT with public_repo scope whose owner has a fork of
      # microsoft/winget-pkgs; the package must already exist upstream
      # (one-time bootstrap, see winget/README.md). Skips cleanly until the
      # secret is set, so it never fails releases before setup (same gate
      # pattern as publish-snap).
      - name: Check for winget token
        id: gate
        shell: bash
        env:
          TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "No WINGET_GITHUB_TOKEN secret; skipping winget publish."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Get version
        if: steps.gate.outputs.enabled == 'true'
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: vedantmgoyal9/winget-releaser@v2
        if: steps.gate.outputs.enabled == 'true'
        with:
          identifier: hamidfzm.Glyph
          version: ${{ steps.version.outputs.version }}
          release-tag: ${{ github.ref_name }}
          installers-regex: '_x64_en-US\.msi$'
          token: ${{ secrets.WINGET_GITHUB_TOKEN }}

  publish-aur:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Download debs and compute sha256
        id: sha
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "Glyph_${VERSION}_amd64.deb" \
            --pattern "Glyph_${VERSION}_arm64.deb"
          echo "sha256_amd64=$(shasum -a 256 "Glyph_${VERSION}_amd64.deb" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "sha256_arm64=$(shasum -a 256 "Glyph_${VERSION}_arm64.deb" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - name: Update AUR package
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_AMD64="${{ steps.sha.outputs.sha256_amd64 }}"
          SHA_ARM64="${{ steps.sha.outputs.sha256_arm64 }}"

          # Configure SSH for AUR
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config << EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          EOF

          # Clone AUR repo
          git clone ssh://aur@aur.archlinux.org/glyph-md-bin.git /tmp/aur

          HOMEPAGE=$(jq -r .homepage package.json)

          # Update PKGBUILD from template
          sed -e "s/{{VERSION}}/$VERSION/g" \
            -e "s/{{SHA256_AMD64}}/$SHA_AMD64/g" \
            -e "s/{{SHA256_ARM64}}/$SHA_ARM64/g" \
            -e "s|{{HOMEPAGE}}|$HOMEPAGE|g" \
            aur/PKGBUILD > /tmp/aur/PKGBUILD

          # Update .SRCINFO from template
          sed -e "s/{{VERSION}}/$VERSION/g" \
            -e "s/{{SHA256_AMD64}}/$SHA_AMD64/g" \
            -e "s/{{SHA256_ARM64}}/$SHA_ARM64/g" \
            -e "s|{{HOMEPAGE}}|$HOMEPAGE|g" \
            aur/.SRCINFO > /tmp/aur/.SRCINFO

          # Push to AUR
          cd /tmp/aur
          git config user.name "hamidfzm"
          git config user.email "hamidfzm@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || {
            git commit -m "Update to $VERSION"
            git push
          }

  publish-ppa:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        series: [jammy, noble]
    steps:
      - uses: actions/checkout@v6
      - name: Install packaging tools
        timeout-minutes: 8
        env:
          DEBIAN_FRONTEND: noninteractive
        run: sudo apt-get update && sudo apt-get install -y devscripts debhelper dput
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Download debs and extract binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "Glyph_${VERSION}_amd64.deb" \
            --pattern "Glyph_${VERSION}_arm64.deb"
          dpkg-deb -x "Glyph_${VERSION}_amd64.deb" /tmp/glyph-extracted
      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long 2>/dev/null | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> "$GITHUB_ENV"
      - name: Build source package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SERIES="${{ matrix.series }}"
          DATE=$(date -R)

          # Set up pristine source tree (no debian/ yet)
          mkdir -p /tmp/glyph-${VERSION}
          cp -r /tmp/glyph-extracted/* /tmp/glyph-${VERSION}/

          # Build orig tarball BEFORE adding debian/, with reproducible flags so
          # every series in the matrix produces a byte-identical file. Launchpad
          # rejects re-uploads of orig.tar.gz with differing contents.
          SOURCE_DATE_EPOCH=$(git log -1 --format=%ct "$GITHUB_REF_NAME")
          tar --sort=name \
              --mtime="@${SOURCE_DATE_EPOCH}" \
              --owner=0 --group=0 --numeric-owner \
              -cf - -C /tmp "glyph-${VERSION}" \
            | gzip -n > /tmp/glyph_${VERSION}.orig.tar.gz

          # Now add debian/ packaging (series-specific changelog lives here, but
          # debuild ships it as the separate .debian.tar.xz, not in orig.tar.gz).
          mkdir -p /tmp/glyph-${VERSION}/debian
          HOMEPAGE=$(jq -r .homepage package.json)
          sed "s|{{HOMEPAGE}}|$HOMEPAGE|g" ppa/debian/control > /tmp/glyph-${VERSION}/debian/control
          cp ppa/debian/rules /tmp/glyph-${VERSION}/debian/

          # Generate debian/copyright from repo LICENSE file
          {
            echo "Format: https://www.debian.org/doc/packaging-manuals/copyright-format/1.0/"
            echo "Upstream-Name: glyph"
            echo "Upstream-Contact: hamidfzm <hamidfzm@users.noreply.github.com>"
            echo "Source: https://github.com/hamidfzm/glyph"
            echo ""
            echo "Files: *"
            echo "Copyright: 2026 hamidfzm"
            echo "License: MIT"
            echo ""
            echo "License: MIT"
            awk 'NR>3{if(/^$/)print " .";else print " "$0}' LICENSE
          } > /tmp/glyph-${VERSION}/debian/copyright

          sed -e "s/{{VERSION}}/$VERSION/g" -e "s/{{SERIES}}/$SERIES/g" -e "s/{{DATE}}/$DATE/g" \
            ppa/debian/changelog > /tmp/glyph-${VERSION}/debian/changelog

          # Build source package (picks up the orig.tar.gz we created above)
          cd /tmp/glyph-${VERSION}
          DEBUILD_LINTIAN=no debuild -S -sa -d -k"$GPG_KEY_ID"
      - name: Upload to PPA
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SERIES="${{ matrix.series }}"
          cd /tmp
          dput ppa:hamidfzm/glyph glyph_${VERSION}-1~${SERIES}1_source.changes

  publish-debian:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install packaging tools
        timeout-minutes: 8
        env:
          DEBIAN_FRONTEND: noninteractive
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev gpg
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Download deb packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "Glyph_${VERSION}_amd64.deb" \
            --pattern "Glyph_${VERSION}_arm64.deb"
      - name: Clone apt-repo and update
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Import GPG key
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long 2>/dev/null | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)

          # Clone the apt repo
          git clone "https://x-access-token:${GH_TOKEN}@github.com/glyph-md/apt-repo.git" /tmp/apt-repo
          cd /tmp/apt-repo

          # Set up pool directory
          mkdir -p pool/main

          # Copy new debs
          cp "$GITHUB_WORKSPACE/Glyph_${VERSION}_amd64.deb" pool/main/
          cp "$GITHUB_WORKSPACE/Glyph_${VERSION}_arm64.deb" pool/main/

          # Generate Packages files
          mkdir -p dists/stable/main/binary-amd64
          mkdir -p dists/stable/main/binary-arm64

          dpkg-scanpackages --arch amd64 pool/ > dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-amd64/Packages

          dpkg-scanpackages --arch arm64 pool/ > dists/stable/main/binary-arm64/Packages
          gzip -k -f dists/stable/main/binary-arm64/Packages

          # Generate Release file
          {
            echo "Origin: Glyph"
            echo "Label: Glyph"
            echo "Suite: stable"
            echo "Codename: stable"
            echo "Architectures: amd64 arm64"
            echo "Components: main"
            echo "Description: Glyph apt repository"
            echo "Date: $(date -Ru)"
            echo "MD5Sum:"
            for f in dists/stable/main/binary-*/Packages*; do
              echo " $(md5sum "$f" | awk '{print $1}') $(wc -c < "$f") ${f#dists/stable/}"
            done
            echo "SHA256:"
            for f in dists/stable/main/binary-*/Packages*; do
              echo " $(sha256sum "$f" | awk '{print $1}') $(wc -c < "$f") ${f#dists/stable/}"
            done
          } > dists/stable/Release

          # Sign the Release file
          gpg --batch --yes --default-key "$GPG_KEY_ID" -abs -o dists/stable/Release.gpg dists/stable/Release
          gpg --batch --yes --default-key "$GPG_KEY_ID" --clearsign -o dists/stable/InRelease dists/stable/Release

          # Export public key
          gpg --armor --export "$GPG_KEY_ID" > gpg.key

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || {
            git commit -m "chore: update packages to $VERSION"
            git push
          }

  publish-snap:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      # The snap is built from the released .deb (see snap/snapcraft.yaml), so
      # this job needs no toolchain. It is a no-op until the maintainer adds the
      # SNAPCRAFT_STORE_CREDENTIALS secret (snapcraft export-login), so it never
      # fails releases before the Snap Store account is set up.
      - name: Check for store credentials
        id: gate
        env:
          CREDS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: |
          if [ -n "$CREDS" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "No SNAPCRAFT_STORE_CREDENTIALS secret; skipping snap publish."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      # snapcraft.yaml discovers the latest release and pulls the .deb for the
      # build architecture. This job runs after the release is published, so
      # "latest" is the tag that triggered this run. (Host env vars are not
      # forwarded into the snapcraft build instance, so the version can't be
      # passed that way.)
      - name: Set website from package.json (single source)
        if: steps.gate.outputs.enabled == 'true'
        run: |
          HOMEPAGE=$(jq -r .homepage package.json)
          sed -i "s|^website: .*|website: $HOMEPAGE|" snap/snapcraft.yaml
      - name: Build snap
        if: steps.gate.outputs.enabled == 'true'
        id: build
        uses: snapcore/action-build@v1
      - name: Publish snap to stable
        if: steps.gate.outputs.enabled == 'true'
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable

  publish-dnf:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # The signed DNF repo lives in glyph-md/rpm-repo (GitHub Pages), mirroring
      # the apt-repo. Skip cleanly until that repo exists, so a missing target
      # never fails the release (gated like publish-snap, though this probes the
      # repo via the API rather than checking a secret's presence). Note:
      # TAP_GITHUB_TOKEN must have access to rpm-repo, otherwise this 404s and the
      # job stays a silent no-op even once the repo is created.
      - name: Check rpm-repo exists
        id: gate
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if gh api repos/glyph-md/rpm-repo >/dev/null 2>&1; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "No glyph-md/rpm-repo; skipping DNF publish."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install packaging tools
        if: steps.gate.outputs.enabled == 'true'
        timeout-minutes: 8
        env:
          DEBIAN_FRONTEND: noninteractive
        run: sudo apt-get update && sudo apt-get install -y createrepo-c rpm gnupg
      - name: Get version
        if: steps.gate.outputs.enabled == 'true'
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Download RPM packages
        if: steps.gate.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "Glyph-${VERSION}-1.x86_64.rpm" \
            --pattern "Glyph-${VERSION}-1.aarch64.rpm"
      - name: Import GPG key
        if: steps.gate.outputs.enabled == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long 2>/dev/null | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> "$GITHUB_ENV"
          # Passphrase file for loopback signing (empty file is harmless for an
          # unprotected key, which is what the apt-repo job also assumes).
          printf '%s' "$GPG_PASSPHRASE" > /tmp/gpg-pass
          # rpm --addsign shells out to gpg; force batch/loopback so it never
          # blocks on a pinentry prompt in CI. rpm execs the macro's first
          # token as a literal binary path (no PATH search), so it must be
          # %{__gpg}; the bare "gpg" after it is argv[0], matching rpm's
          # stock macro shape.
          cat > "$HOME/.rpmmacros" <<EOF
          %_gpg_name $GPG_KEY_ID
          %__gpg /usr/bin/gpg
          %__gpg_sign_cmd %{__gpg} gpg --batch --no-verbose --no-armor --pinentry-mode loopback --passphrase-file /tmp/gpg-pass --no-secmem-warning -u "%{_gpg_name}" --sign --detach-sign --output %{__signature_filename} %{__plaintext_filename}
          EOF
      - name: Clone rpm-repo, sign RPMs, and rebuild metadata
        if: steps.gate.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/glyph-md/rpm-repo.git" /tmp/rpm-repo
          cd /tmp/rpm-repo

          # Flat repo at the Pages root: RPMs sit next to repodata/, matching the
          # baseurl in dnf/glyph.repo. Copy in this release's packages (overwrite
          # if re-running the same tag), then sign only those two files, not the
          # whole history, so prior releases' RPMs are left untouched (mirrors how
          # publish-debian only handles the current version's debs).
          cp "$GITHUB_WORKSPACE/Glyph-${VERSION}-1.x86_64.rpm" .
          cp "$GITHUB_WORKSPACE/Glyph-${VERSION}-1.aarch64.rpm" .
          rpm --addsign "Glyph-${VERSION}-1.x86_64.rpm" "Glyph-${VERSION}-1.aarch64.rpm"

          # Regenerate repodata over all versions (full rebuild is idempotent).
          createrepo_c --revision "$VERSION" .

          # repo_gpgcheck=1 verifies a detached signature of repomd.xml.
          gpg --batch --yes --pinentry-mode loopback --passphrase-file /tmp/gpg-pass \
            --default-key "$GPG_KEY_ID" --detach-sign --armor repodata/repomd.xml

          # Ship the public key and the .repo drop-in at the root.
          gpg --armor --export "$GPG_KEY_ID" > gpg.key
          cp "$GITHUB_WORKSPACE/dnf/glyph.repo" glyph.repo

          # Serve the RPMs and repodata as raw files: .nojekyll turns off the
          # Pages Jekyll build, which otherwise fails on this non-site repo.
          touch .nojekyll

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || {
            git commit -m "chore: update packages to $VERSION"
            git push
          }
