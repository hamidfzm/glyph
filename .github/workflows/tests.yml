name: Tests

on:
  workflow_call:

jobs:
  test-frontend:
    name: Test (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        run: pnpm test:coverage
      - name: Upload coverage report (artifact)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 14
      - name: Upload frontend coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          # PyPI uploader: the GPG-verified binary intermittently fails.
          use_pypi: true
      - name: Upload frontend test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          files: junit-frontend.xml
          flags: frontend
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          # PyPI uploader: the GPG-verified binary intermittently fails.
          use_pypi: true

  test-rust:
    name: Test (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Cache apt packages
        uses: actions/cache@v5
        with:
          path: ~/apt-cache/*.deb
          key: apt-webkit-ubuntu-latest-${{ runner.arch }}-v1
      - name: Install Linux dependencies
        timeout-minutes: 8
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          mkdir -p ~/apt-cache/partial
          sudo apt-get update
          sudo apt-get -o Dir::Cache::archives="$HOME/apt-cache" \
            -o Binary::apt::APT::Keep-Downloaded-Packages=true \
            install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Run Rust tests with coverage
        working-directory: src-tauri
        run: cargo llvm-cov nextest --lcov --output-path ../coverage-rust.lcov --profile ci
      - name: Upload Rust coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: coverage-rust.lcov
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          # PyPI uploader: the GPG-verified binary intermittently fails.
          use_pypi: true
      - name: Upload Rust test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          files: src-tauri/target/nextest/ci/junit.xml
          flags: rust
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          # PyPI uploader: the GPG-verified binary intermittently fails.
          use_pypi: true

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Cache apt packages
        uses: actions/cache@v5
        with:
          path: ~/apt-cache/*.deb
          key: apt-webkit-ubuntu-latest-${{ runner.arch }}-v1
      - name: Install Linux dependencies
        timeout-minutes: 8
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          mkdir -p ~/apt-cache/partial
          sudo apt-get update
          sudo apt-get -o Dir::Cache::archives="$HOME/apt-cache" \
            -o Binary::apt::APT::Keep-Downloaded-Packages=true \
            install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Add Clippy problem matcher
        run: echo "::add-matcher::.github/matchers/rust.json"
      - name: Run Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
