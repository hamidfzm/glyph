coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
      frontend:
        flags:
          - frontend
        target: 80%
        threshold: 1%
      rust:
        flags:
          - rust
        target: 85%
        threshold: 1%
    patch:
      default:
        target: 80%
        threshold: 5%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false

flags:
  frontend:
    paths:
      - src/
    carryforward: true
  rust:
    paths:
      - src-tauri/src/
    carryforward: true

ignore:
  - "src/main.tsx"
  - "src/vite-env.d.ts"
  - "src/test/**"
  - "src/components/icons/**"
  - "src-tauri/src/main.rs"
  - "**/*.test.ts"
  - "**/*.test.tsx"
